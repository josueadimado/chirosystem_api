services:
  db:
    image: postgres:16-alpine
    container_name: chiroflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chiroflow}
      POSTGRES_USER: ${POSTGRES_USER:-chiroflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - chiroflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 30s

  redis:
    image: redis:7-alpine
    container_name: chiroflow-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - chiroflow_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    stop_grace_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chiroflow-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings}
      DEBUG: "false"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DATABASE_URL: postgresql://${POSTGRES_USER:-chiroflow_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-chiroflow}
      CELERY_BROKER_URL: redis://redis:6379/0
    # Optional: set DJANGO_ADMIN_USERNAME + DJANGO_ADMIN_PASSWORD in .env to bootstrap / refresh admin on each deploy.
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             if [ -n \"$$DJANGO_ADMIN_USERNAME\" ] && [ -n \"$$DJANGO_ADMIN_PASSWORD\" ]; then python manage.py create_admin_from_env; fi &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8000)); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 300s
    stop_grace_period: 30s
    networks:
      - default
      - web

  voice-ws:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chiroflow-voice-ws
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings}
      DEBUG: "false"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DATABASE_URL: postgresql://${POSTGRES_USER:-chiroflow_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-chiroflow}
      CELERY_BROKER_URL: redis://redis:6379/0
    command: uvicorn voice_relay:app --host 0.0.0.0 --port 8001 --workers 2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${VOICE_WS_HOST_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8001)); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    stop_grace_period: 10s
    networks:
      - default
      - web

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chiroflow-celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings}
      DEBUG: "false"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DATABASE_URL: postgresql://${POSTGRES_USER:-chiroflow_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-chiroflow}
      CELERY_BROKER_URL: redis://redis:6379/0
    command: celery -A config worker -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    stop_grace_period: 30s

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chiroflow-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings}
      DEBUG: "false"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DATABASE_URL: postgresql://${POSTGRES_USER:-chiroflow_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-chiroflow}
      CELERY_BROKER_URL: redis://redis:6379/0
    command: celery -A config beat -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    stop_grace_period: 30s

volumes:
  chiroflow_postgres_data:
  chiroflow_redis_data:

networks:
  web:
    external: true
