# Production API stack — no source bind mounts, Gunicorn.
# From this folder:
#   docker compose -f docker-compose.prod.yml up --build -d
# Set strong POSTGRES_PASSWORD, DJANGO_DEBUG=0, DJANGO_ALLOWED_HOSTS in .env before deploy.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chiroflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 2
      --access-logfile -
      --error-logfile -
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config worker -l info
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - api
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config beat -l info
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - api
    restart: unless-stopped

volumes:
  postgres_data_prod:
